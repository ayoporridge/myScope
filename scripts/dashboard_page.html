<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyScope 仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1419; color: #e7e9ea; padding: 20px; }
h1 { font-size: 1.4rem; margin-bottom: 6px; color: #fff; }
.subtitle { color: #71767b; font-size: 0.85rem; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
.card { background: #1a1f25; border: 1px solid #2f3336; border-radius: 12px; padding: 16px; }
.card h2 { font-size: 0.9rem; color: #71767b; margin-bottom: 12px; letter-spacing: 0.5px; }
.status-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.status-item { background: #0f1419; border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 140px; }
.status-item .name { font-size: 0.75rem; color: #71767b; margin-bottom: 4px; }
.status-item .time { font-size: 0.85rem; }
.status-item .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.dot-green { background: #00ba7c; }
.dot-yellow { background: #f7b955; }
.dot-red { background: #f4212e; }
.index-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
.index-item { text-align: center; padding: 12px 8px; background: #0f1419; border-radius: 8px; }
.index-item .num { font-size: 1.5rem; font-weight: 700; color: #1d9bf0; }
.index-item .label { font-size: 0.7rem; color: #71767b; margin-top: 4px; }
.flow-container { position: relative; width: 100%; min-height: 200px; }
.flow-container svg { width: 100%; height: 200px; }
.flow-node { fill: #1a1f25; stroke: #2f3336; stroke-width: 1.5; rx: 8; }
.flow-arrow { stroke: #1d9bf0; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
.flow-label { fill: #e7e9ea; font-size: 11px; text-anchor: middle; }
.flow-num { fill: #1d9bf0; font-size: 10px; text-anchor: middle; font-weight: bold; }
canvas { max-height: 220px; }
.refresh-info { text-align: right; font-size: 0.7rem; color: #536471; margin-top: 8px; }
/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
.modal-overlay.active { display: flex; }
.modal { background: #1a1f25; border: 1px solid #2f3336; border-radius: 12px; width: 100%; max-width: 700px; max-height: 80vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #2f3336; position: sticky; top: 0; background: #1a1f25; z-index: 1; }
.modal-header h3 { font-size: 1rem; }
.modal-close { background: none; border: none; color: #71767b; font-size: 1.5rem; cursor: pointer; }
.modal-close:hover { color: #fff; }
.modal-search { padding: 12px 20px; border-bottom: 1px solid #2f3336; }
.modal-search input { width: 100%; background: #0f1419; border: 1px solid #2f3336; border-radius: 8px; padding: 8px 12px; color: #e7e9ea; font-size: 0.85rem; outline: none; }
.modal-search input:focus { border-color: #1d9bf0; }
.modal-body { padding: 12px 20px; }
.browse-item { padding: 12px 0; border-bottom: 1px solid #2f3336; }
.browse-item:last-child { border-bottom: none; }
.browse-item .title { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: #1d9bf0; }
.browse-item .content { font-size: 0.8rem; color: #ccc; line-height: 1.5; }
.browse-item .meta { font-size: 0.7rem; color: #536471; margin-top: 4px; }
.clickable { cursor: pointer; transition: transform 0.1s; }
.clickable:hover { transform: scale(1.05); }
</style>
</head>
<body>
<h1>MyScope 仪表盘</h1>
<p class="subtitle">记忆系统运行状态与数据流动 &mdash; <span id="clock"></span></p>

<!-- Row 1: Status + Indexes -->
<div class="grid">
  <div class="card">
    <h2>脚本存活状态</h2>
    <div id="status-container" class="status-grid">加载中...</div>
  </div>
  <div class="card">
    <h2>数据总量</h2>
    <div id="index-container" class="index-grid">加载中...</div>
  </div>
</div>

<!-- Row 2: Charts -->
<div class="grid">
  <div class="card">
    <h2>Formation 质量趋势（近 7 天）</h2>
    <canvas id="formationChart"></canvas>
  </div>
  <div class="card">
    <h2>每日吞吐量</h2>
    <canvas id="throughputChart"></canvas>
  </div>
</div>

<!-- Row 3: Data Flow -->
<div class="card" style="margin-bottom:20px">
  <h2>数据管道动线</h2>
  <div class="flow-container">
    <svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
      <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#1d9bf0"/></marker></defs>
      <!-- 数据源 -->
      <rect class="flow-node" x="10" y="20" width="110" height="36"/>
      <text class="flow-label" x="65" y="43">微信/Obsidian</text>
      <rect class="flow-node" x="10" y="70" width="110" height="36"/>
      <text class="flow-label" x="65" y="93">Flomo</text>
      <rect class="flow-node" x="10" y="120" width="110" height="36"/>
      <text class="flow-label" x="65" y="143">RSS/公众号</text>
      <rect class="flow-node" x="10" y="155" width="110" height="36"/>
      <text class="flow-label" x="65" y="178">AI 对话/Dayflow</text>
      <!-- 第一层 -->
      <rect class="flow-node" x="200" y="30" width="130" height="50"/>
      <text class="flow-label" x="265" y="50">第一层：事实记忆</text>
      <text class="flow-label" x="265" y="65" style="font-size:9px;fill:#71767b">memory_chunks</text>
      <text class="flow-num" x="265" y="80" id="flow-l1">—</text>
      <!-- 第三层 -->
      <rect class="flow-node" x="200" y="110" width="130" height="50"/>
      <text class="flow-label" x="265" y="130">第三层：哈勃半径</text>
      <text class="flow-label" x="265" y="145" style="font-size:9px;fill:#71767b">hubble_radius</text>
      <text class="flow-num" x="265" y="160" id="flow-l3">—</text>
      <!-- 第二层 -->
      <rect class="flow-node" x="420" y="60" width="130" height="60"/>
      <text class="flow-label" x="485" y="80">第二层：结构知识</text>
      <text class="flow-label" x="485" y="95" style="font-size:9px;fill:#71767b">wiki_entries</text>
      <text class="flow-num" x="485" y="113" id="flow-l2">—</text>
      <!-- Anda 图谱 -->
      <rect class="flow-node" x="420" y="145" width="130" height="45"/>
      <text class="flow-label" x="485" y="165">Anda 知识图谱</text>
      <text class="flow-num" x="485" y="180" id="flow-anda">—</text>
      <!-- MCP 出口 -->
      <rect class="flow-node" x="640" y="70" width="140" height="60" style="stroke:#1d9bf0"/>
      <text class="flow-label" x="710" y="95" style="fill:#1d9bf0">MCP 记忆接口</text>
      <text class="flow-label" x="710" y="112" style="font-size:9px;fill:#71767b">搜索 / 召回</text>
      <!-- 箭头 -->
      <path class="flow-arrow" d="M120,38 L195,50"/>
      <path class="flow-arrow" d="M120,88 L195,55"/>
      <path class="flow-arrow" d="M120,138 L195,130"/>
      <path class="flow-arrow" d="M120,173 L195,160"/>
      <!-- 第一层 → 第二层 -->
      <path class="flow-arrow" d="M330,55 L415,80"/>
      <!-- 第三层 → 第二层（跨层综合） -->
      <path class="flow-arrow" d="M330,130 L415,100" style="stroke:#f7b955;stroke-dasharray:4"/>
      <!-- 数据源 → Anda -->
      <path class="flow-arrow" d="M120,173 C180,173 360,167 415,167"/>
      <!-- → MCP -->
      <path class="flow-arrow" d="M550,90 L635,95"/>
      <path class="flow-arrow" d="M550,167 L635,110"/>
    </svg>
  </div>
  <p class="refresh-info">虚线 = 第二层跨层综合（从哈勃半径拉取相关内容归纳进 Wiki）</p>
</div>

<p class="refresh-info">每 30 秒自动刷新 | 上次更新：<span id="last-update">—</span></p>

<!-- 浏览弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">浏览内容</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-search">
      <input type="text" id="modal-search-input" placeholder="输入关键词搜索..." onkeydown="if(event.key==='Enter')doSearch()">
    </div>
    <div class="modal-body" id="modal-body">加载中...</div>
  </div>
</div>

<script>
const API = '';

async function fetchJSON(path) {
  const r = await fetch(API + path);
  return r.json();
}

function renderStatus(data) {
  const el = document.getElementById('status-container');
  const statusText = { green: '正常', yellow: '注意', red: '异常' };
  el.innerHTML = data.scripts.map(s => `
    <div class="status-item">
      <div class="name">${s.name}</div>
      <div class="time"><span class="dot dot-${s.status}"></span>${s.hours_ago >= 0 ? s.hours_ago + ' 小时前' : '从未运行'}</div>
    </div>
  `).join('');
}

function renderIndexes(data) {
  const el = document.getElementById('index-container');
  const items = [
    { key: 'memory_chunks', label: '事实碎片', index: 'memory_chunks' },
    { key: 'wiki_entries', label: 'Wiki 条目', index: 'wiki_entries' },
    { key: 'hubble_radius', label: '哈勃半径', index: 'hubble_radius' },
    { key: 'anda_concepts', label: '图谱概念', index: 'anda' },
    { key: 'anda_propositions', label: '图谱命题', index: 'anda' },
  ];
  el.innerHTML = items.map(i => `
    <div class="index-item clickable" onclick="openBrowse('${i.index}', '${i.label}')">
      <div class="num">${data[i.key] >= 0 ? data[i.key] : '?'}</div>
      <div class="label">${i.label}</div>
    </div>
  `).join('');
  document.getElementById('flow-l1').textContent = data.memory_chunks >= 0 ? data.memory_chunks : '?';
  document.getElementById('flow-l2').textContent = data.wiki_entries >= 0 ? data.wiki_entries : '?';
  document.getElementById('flow-l3').textContent = data.hubble_radius >= 0 ? data.hubble_radius : '?';
  const anda = data.anda_concepts >= 0 ? `${data.anda_concepts}C / ${data.anda_propositions}P` : '?';
  document.getElementById('flow-anda').textContent = anda;
}

let formationChart = null;
let throughputChart = null;

function renderCharts(metrics) {
  const byDate = {};
  metrics.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = {};
    byDate[m.date][m.script] = m;
  });
  const dates = Object.keys(byDate).sort();

  // Formation 质量
  const ctx1 = document.getElementById('formationChart').getContext('2d');
  const formData = {
    labels: dates,
    datasets: [
      { label: '原始消息', data: dates.map(d => byDate[d].hippocampus_formation?.total_messages || 0), borderColor: '#536471', tension: 0.3 },
      { label: '有效消息', data: dates.map(d => byDate[d].hippocampus_formation?.meaningful_messages || 0), borderColor: '#00ba7c', tension: 0.3 },
      { label: '过滤噪音', data: dates.map(d => byDate[d].hippocampus_formation?.filtered_messages || 0), borderColor: '#f4212e', tension: 0.3 },
    ]
  };
  if (formationChart) formationChart.destroy();
  formationChart = new Chart(ctx1, { type: 'line', data: formData, options: { responsive: true, plugins: { legend: { labels: { color: '#71767b', boxWidth: 12 } } }, scales: { x: { ticks: { color: '#536471' } }, y: { ticks: { color: '#536471' }, beginAtZero: true } } } });

  // 每日吞吐
  const ctx2 = document.getElementById('throughputChart').getContext('2d');
  const tpData = {
    labels: dates,
    datasets: [
      { label: '第一层切片', data: dates.map(d => byDate[d].layer1_rag?.chunks_produced || byDate[d].layer1_flomo?.chunks || 0), backgroundColor: '#1d9bf044', borderColor: '#1d9bf0', tension: 0.3 },
      { label: '第二层 Wiki', data: dates.map(d => byDate[d].layer2_wiki?.wiki_entries_written || 0), backgroundColor: '#00ba7c44', borderColor: '#00ba7c', tension: 0.3 },
      { label: '第三层文章', data: dates.map(d => byDate[d].layer3_wechat?.articles_indexed || 0), backgroundColor: '#f7b95544', borderColor: '#f7b955', tension: 0.3 },
    ]
  };
  if (throughputChart) throughputChart.destroy();
  throughputChart = new Chart(ctx2, { type: 'bar', data: tpData, options: { responsive: true, plugins: { legend: { labels: { color: '#71767b', boxWidth: 12 } } }, scales: { x: { ticks: { color: '#536471' }, stacked: false }, y: { ticks: { color: '#536471' }, beginAtZero: true } } } });
}

async function refresh() {
  try {
    const [status, metrics, indexes] = await Promise.all([
      fetchJSON('/api/status'),
      fetchJSON('/api/metrics?days=7'),
      fetchJSON('/api/indexes'),
    ]);
    renderStatus(status);
    renderIndexes(indexes);
    renderCharts(metrics);
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('zh-CN');
  } catch (e) {
    console.error('刷新失败:', e);
  }
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString('zh-CN', { hour12: false });
}

refresh();
setInterval(refresh, 30000);
setInterval(updateClock, 1000);
updateClock();

// ── 浏览弹窗逻辑 ──────────────────────────────────
let currentBrowseIndex = '';

function openBrowse(index, title) {
  currentBrowseIndex = index;
  document.getElementById('modal-title').textContent = '浏览：' + title;
  document.getElementById('modal-search-input').value = '';
  document.getElementById('modal').classList.add('active');
  loadBrowseData(index, '');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

// 点击遮罩关闭
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function doSearch() {
  const q = document.getElementById('modal-search-input').value.trim();
  loadBrowseData(currentBrowseIndex, q);
}

async function loadBrowseData(index, query) {
  const body = document.getElementById('modal-body');
  body.innerHTML = '<p style="color:#71767b">加载中...</p>';
  try {
    const data = await fetchJSON(`/api/browse?index=${encodeURIComponent(index)}&q=${encodeURIComponent(query)}&limit=30`);
    if (!data.ok) {
      body.innerHTML = `<p style="color:#f4212e">错误：${data.error}</p>`;
      return;
    }
    if (index === 'anda') {
      renderAndaResults(data.results, body);
    } else {
      renderMeiliResults(data.results, body);
    }
  } catch (e) {
    body.innerHTML = `<p style="color:#f4212e">请求失败：${e.message}</p>`;
  }
}

function renderMeiliResults(results, container) {
  if (!results || results.length === 0) {
    container.innerHTML = '<p style="color:#71767b">无内容</p>';
    return;
  }
  container.innerHTML = results.map(item => {
    const title = item.title || item.summary || '';
    const content = item.content || item.text || item.digest || '';
    const source = item.source || '';
    const date = item.created_at || item.updated_at || item.published_at || item.date || '';
    const tags = item.tags || item.keywords || [];
    const tagStr = tags.length ? tags.map(t => `<span style="background:#2f3336;padding:2px 6px;border-radius:4px;font-size:0.7rem;margin-right:4px">${t}</span>`).join('') : '';
    return `
      <div class="browse-item">
        ${title ? `<div class="title">${title}</div>` : ''}
        <div class="content">${content.slice(0, 300)}${content.length > 300 ? '...' : ''}</div>
        <div class="meta">${source ? '来源：' + source : ''} ${date ? ' | ' + date.slice(0, 16) : ''} ${tagStr}</div>
      </div>
    `;
  }).join('');
}

function renderAndaResults(results, container) {
  if (!results) {
    container.innerHTML = '<p style="color:#71767b">无内容</p>';
    return;
  }
  let html = '';
  // 统计信息
  if (results.concepts !== undefined) {
    html += `<div class="browse-item">
      <div class="title">图谱统计</div>
      <div class="content">概念节点：${results.concepts} 个 | 命题关系：${results.propositions} 条 | 对话轮次：${results.conversations} 个</div>
      <div class="meta">Formation 用量：${(results.formation_usage?.input_tokens/1000000)?.toFixed(1) || 0}M tokens / ${results.formation_usage?.requests || 0} 次请求</div>
    </div>`;
  }
  // 最近对话列表
  if (results.recent_conversations && results.recent_conversations.length > 0) {
    html += '<div class="browse-item"><div class="title">最近对话记录</div></div>';
    results.recent_conversations.forEach(conv => {
      const id = conv.id || conv;
      const ts = conv.created_at || conv.timestamp || '';
      html += `<div class="browse-item">
        <div class="content" style="font-size:0.75rem">#${typeof id === 'object' ? JSON.stringify(id) : id}</div>
        ${ts ? `<div class="meta">${ts}</div>` : ''}
      </div>`;
    });
  }
  if (!html) {
    html = `<div class="browse-item"><div class="content" style="white-space:pre-wrap;font-size:0.75rem">${JSON.stringify(results, null, 2)}</div></div>`;
  }
  container.innerHTML = html;
}
</script>
</body>
</html>
