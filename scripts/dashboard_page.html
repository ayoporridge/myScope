<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyScope Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1419; color: #e7e9ea; padding: 20px; }
h1 { font-size: 1.4rem; margin-bottom: 6px; color: #fff; }
.subtitle { color: #71767b; font-size: 0.85rem; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
.card { background: #1a1f25; border: 1px solid #2f3336; border-radius: 12px; padding: 16px; }
.card h2 { font-size: 0.9rem; color: #71767b; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.status-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.status-item { background: #0f1419; border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 140px; }
.status-item .name { font-size: 0.75rem; color: #71767b; margin-bottom: 4px; }
.status-item .time { font-size: 0.85rem; }
.status-item .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.dot-green { background: #00ba7c; }
.dot-yellow { background: #f7b955; }
.dot-red { background: #f4212e; }
.index-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
.index-item { text-align: center; padding: 12px 8px; background: #0f1419; border-radius: 8px; }
.index-item .num { font-size: 1.5rem; font-weight: 700; color: #1d9bf0; }
.index-item .label { font-size: 0.7rem; color: #71767b; margin-top: 4px; }
.flow-container { position: relative; width: 100%; min-height: 200px; }
.flow-container svg { width: 100%; height: 200px; }
.flow-node { fill: #1a1f25; stroke: #2f3336; stroke-width: 1.5; rx: 8; }
.flow-arrow { stroke: #1d9bf0; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
.flow-label { fill: #e7e9ea; font-size: 11px; text-anchor: middle; }
.flow-num { fill: #1d9bf0; font-size: 10px; text-anchor: middle; font-weight: bold; }
canvas { max-height: 220px; }
.refresh-info { text-align: right; font-size: 0.7rem; color: #536471; margin-top: 8px; }
</style>
</head>
<body>
<h1>MyScope Dashboard</h1>
<p class="subtitle">Memory System Health &amp; Data Flow &mdash; <span id="clock"></span></p>

<!-- Row 1: Status + Indexes -->
<div class="grid">
  <div class="card">
    <h2>Script Liveness</h2>
    <div id="status-container" class="status-grid">Loading...</div>
  </div>
  <div class="card">
    <h2>Data Volumes</h2>
    <div id="index-container" class="index-grid">Loading...</div>
  </div>
</div>

<!-- Row 2: Charts -->
<div class="grid">
  <div class="card">
    <h2>Formation Quality (7d)</h2>
    <canvas id="formationChart"></canvas>
  </div>
  <div class="card">
    <h2>Daily Throughput</h2>
    <canvas id="throughputChart"></canvas>
  </div>
</div>

<!-- Row 3: Data Flow -->
<div class="card" style="margin-bottom:20px">
  <h2>Data Pipeline</h2>
  <div class="flow-container">
    <svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
      <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#1d9bf0"/></marker></defs>
      <!-- Sources -->
      <rect class="flow-node" x="10" y="20" width="110" height="36"/>
      <text class="flow-label" x="65" y="43">WeChat/Obsidian</text>
      <rect class="flow-node" x="10" y="70" width="110" height="36"/>
      <text class="flow-label" x="65" y="93">Flomo</text>
      <rect class="flow-node" x="10" y="120" width="110" height="36"/>
      <text class="flow-label" x="65" y="143">FreshRSS/公众号</text>
      <rect class="flow-node" x="10" y="155" width="110" height="36"/>
      <text class="flow-label" x="65" y="178">AI 对话/Dayflow</text>
      <!-- Layer 1 -->
      <rect class="flow-node" x="200" y="30" width="130" height="50"/>
      <text class="flow-label" x="265" y="53">Layer 1</text>
      <text class="flow-label" x="265" y="68" style="font-size:9px;fill:#71767b">memory_chunks</text>
      <text class="flow-num" x="265" y="83" id="flow-l1">—</text>
      <!-- Layer 3 -->
      <rect class="flow-node" x="200" y="110" width="130" height="50"/>
      <text class="flow-label" x="265" y="133">Layer 3</text>
      <text class="flow-label" x="265" y="148" style="font-size:9px;fill:#71767b">hubble_radius</text>
      <text class="flow-num" x="265" y="163" id="flow-l3">—</text>
      <!-- Layer 2 -->
      <rect class="flow-node" x="420" y="60" width="130" height="60"/>
      <text class="flow-label" x="485" y="83">Layer 2</text>
      <text class="flow-label" x="485" y="98" style="font-size:9px;fill:#71767b">wiki_entries</text>
      <text class="flow-num" x="485" y="113" id="flow-l2">—</text>
      <!-- Anda -->
      <rect class="flow-node" x="420" y="145" width="130" height="45"/>
      <text class="flow-label" x="485" y="165">Anda Graph</text>
      <text class="flow-num" x="485" y="180" id="flow-anda">—</text>
      <!-- MCP -->
      <rect class="flow-node" x="640" y="70" width="140" height="60" style="stroke:#1d9bf0"/>
      <text class="flow-label" x="710" y="95" style="fill:#1d9bf0">MCP Server</text>
      <text class="flow-label" x="710" y="112" style="font-size:9px;fill:#71767b">search / recall</text>
      <!-- Arrows -->
      <path class="flow-arrow" d="M120,38 L195,50"/>
      <path class="flow-arrow" d="M120,88 L195,55"/>
      <path class="flow-arrow" d="M120,138 L195,130"/>
      <path class="flow-arrow" d="M120,173 L195,160"/>
      <!-- L1 → L2 -->
      <path class="flow-arrow" d="M330,55 L415,80"/>
      <!-- L3 → L2 (cross-layer) -->
      <path class="flow-arrow" d="M330,130 L415,100" style="stroke:#f7b955;stroke-dasharray:4"/>
      <!-- Anda ← sources -->
      <path class="flow-arrow" d="M120,173 C180,173 360,167 415,167"/>
      <!-- → MCP -->
      <path class="flow-arrow" d="M550,90 L635,95"/>
      <path class="flow-arrow" d="M550,167 L635,110"/>
    </svg>
  </div>
  <p class="refresh-info">Dashed line = Layer 2 cross-layer synthesis (hubble → wiki)</p>
</div>

<p class="refresh-info">Auto-refresh every 30s | <span id="last-update">—</span></p>

<script>
const API = '';  // same origin

async function fetchJSON(path) {
  const r = await fetch(API + path);
  return r.json();
}

function renderStatus(data) {
  const el = document.getElementById('status-container');
  el.innerHTML = data.scripts.map(s => `
    <div class="status-item">
      <div class="name">${s.name}</div>
      <div class="time"><span class="dot dot-${s.status}"></span>${s.hours_ago >= 0 ? s.hours_ago + 'h ago' : 'never'}</div>
    </div>
  `).join('');
}

function renderIndexes(data) {
  const el = document.getElementById('index-container');
  const items = [
    { key: 'memory_chunks', label: 'Chunks' },
    { key: 'wiki_entries', label: 'Wiki' },
    { key: 'hubble_radius', label: 'Hubble' },
    { key: 'anda_concepts', label: 'Concepts' },
    { key: 'anda_propositions', label: 'Props' },
  ];
  el.innerHTML = items.map(i => `
    <div class="index-item">
      <div class="num">${data[i.key] >= 0 ? data[i.key] : '?'}</div>
      <div class="label">${i.label}</div>
    </div>
  `).join('');
  // Update flow diagram numbers
  document.getElementById('flow-l1').textContent = data.memory_chunks >= 0 ? data.memory_chunks : '?';
  document.getElementById('flow-l2').textContent = data.wiki_entries >= 0 ? data.wiki_entries : '?';
  document.getElementById('flow-l3').textContent = data.hubble_radius >= 0 ? data.hubble_radius : '?';
  const anda = data.anda_concepts >= 0 ? `${data.anda_concepts}C/${data.anda_propositions}P` : '?';
  document.getElementById('flow-anda').textContent = anda;
}

let formationChart = null;
let throughputChart = null;

function renderCharts(metrics) {
  // Group by date
  const byDate = {};
  metrics.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = {};
    byDate[m.date][m.script] = m;
  });
  const dates = Object.keys(byDate).sort();

  // Formation chart
  const ctx1 = document.getElementById('formationChart').getContext('2d');
  const formData = {
    labels: dates,
    datasets: [
      { label: 'Total', data: dates.map(d => byDate[d].hippocampus_formation?.total_messages || 0), borderColor: '#536471', tension: 0.3 },
      { label: 'Meaningful', data: dates.map(d => byDate[d].hippocampus_formation?.meaningful_messages || 0), borderColor: '#00ba7c', tension: 0.3 },
      { label: 'Filtered', data: dates.map(d => byDate[d].hippocampus_formation?.filtered_messages || 0), borderColor: '#f4212e', tension: 0.3 },
    ]
  };
  if (formationChart) formationChart.destroy();
  formationChart = new Chart(ctx1, { type: 'line', data: formData, options: { responsive: true, plugins: { legend: { labels: { color: '#71767b', boxWidth: 12 } } }, scales: { x: { ticks: { color: '#536471' } }, y: { ticks: { color: '#536471' }, beginAtZero: true } } } });

  // Throughput chart
  const ctx2 = document.getElementById('throughputChart').getContext('2d');
  const tpData = {
    labels: dates,
    datasets: [
      { label: 'L1 chunks', data: dates.map(d => byDate[d].layer1_rag?.chunks_produced || byDate[d].layer1_flomo?.chunks || 0), backgroundColor: '#1d9bf044', borderColor: '#1d9bf0', tension: 0.3 },
      { label: 'L2 wiki', data: dates.map(d => byDate[d].layer2_wiki?.wiki_entries_written || 0), backgroundColor: '#00ba7c44', borderColor: '#00ba7c', tension: 0.3 },
      { label: 'L3 articles', data: dates.map(d => byDate[d].layer3_wechat?.articles_indexed || 0), backgroundColor: '#f7b95544', borderColor: '#f7b955', tension: 0.3 },
    ]
  };
  if (throughputChart) throughputChart.destroy();
  throughputChart = new Chart(ctx2, { type: 'bar', data: tpData, options: { responsive: true, plugins: { legend: { labels: { color: '#71767b', boxWidth: 12 } } }, scales: { x: { ticks: { color: '#536471' }, stacked: false }, y: { ticks: { color: '#536471' }, beginAtZero: true } } } });
}

async function refresh() {
  try {
    const [status, metrics, indexes] = await Promise.all([
      fetchJSON('/api/status'),
      fetchJSON('/api/metrics?days=7'),
      fetchJSON('/api/indexes'),
    ]);
    renderStatus(status);
    renderIndexes(indexes);
    renderCharts(metrics);
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
  } catch (e) {
    console.error('Refresh failed:', e);
  }
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString('zh-CN', { hour12: false });
}

// Init
refresh();
setInterval(refresh, 30000);
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
